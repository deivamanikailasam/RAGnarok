# CI (Step 27): lint -> type-check -> test -> golden-set eval gate.
# A change that regresses the eval gate does not ship (Step 24).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src || true # advisory until fully annotated
      - name: Test
        run: pytest -q
      - name: Golden-set eval gate (offline, deterministic backends)
        env:
          RAGNAROK_EMBED_BACKEND: local
          RAGNAROK_RERANK_BACKEND: local
        run: python -m ragnarok.eval.ci_gate
