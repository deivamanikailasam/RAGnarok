# RAGnarok — core local stack (Step 1).
# Stateful dependencies as containers so the environment is reproducible and disposable.
# Model serving lives in compose.serving.yaml (Step 2) so the data plane and model plane
# scale independently.
#
#   docker compose -f docker/compose.core.yaml up -d
#   ragnarok doctor

name: ragnarok-core

services:
  qdrant: # vector + sparse store (Steps 10, 16)
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres: # registry, Feast offline store, Langfuse backend (Steps 5, 11)
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ragnarok}
      POSTGRES_DB: ragnarok
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis: # cache + task queue + Feast online store (Steps 5, 7, 11, 27)
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse: # LLM tracing / cost accounting (Step 26)
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD:-ragnarok}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-change-me-in-prod}
      SALT: ${LANGFUSE_SALT:-change-me-in-prod}
      TELEMETRY_ENABLED: "false"
    ports: ["3000:3000"]

  prometheus: # metrics scrape (Step 26)
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]

  grafana: # dashboards (Step 26)
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ragnarok}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports: ["3001:3000"]
    volumes: ["grafana_data:/var/lib/grafana"]

volumes:
  qdrant_data: {}
  pg_data: {}
  redis_data: {}
  grafana_data: {}
