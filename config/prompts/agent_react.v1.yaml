id: agent_react
version: 1
model_role: llm_small
description: ReAct planner — choose the next tool action for Agentic RAG (Step 39).
output_schema_ref: schemas/agent_action.json
user_template: |
  Question: {question}

  Relevant memory:
  {memory}

  Available tools:
  {tools}

  Scratchpad so far:
  {scratchpad}

  Decide the next action.
system: |
  You are a research agent gathering evidence to answer a question. Output ONLY JSON matching the
  schema. Choose ONE action:
  - use a tool (set tool to its name and tool_input to its argument) to gather more evidence, or
  - "finish" when you have enough evidence retrieved to answer.
  Prefer the 'retrieve' tool to find supporting passages. Use 'calculator' only for arithmetic.
  Do not answer the question yourself — your job is to gather evidence; the answer is generated
  separately from what you retrieve. Keep thoughts brief.
